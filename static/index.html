<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CertiFlow UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .row { margin-bottom: 12px }
    textarea { width: 100%; height: 120px; }
    input[type=text] { width: 60%; }
    button { margin-left: 8px; }
    pre { background:#f6f8fa; padding:12px; overflow:auto; }
  </style>
</head>
<body>
  <h1>CertiFlow Quick UI</h1>

  <div class="row">
    <label>Employee ID: <input id="employeeId" type="text" value="EMP-001"/></label>
  </div>

  <div class="row">
    <button onclick="callAction('GENERATE_SCHEDULE')">Generate Schedule</button>
    <button onclick="callAction('ENGAGEMENT_NUDGE')">Engagement Nudge</button>
    <button onclick="callAction('MANAGER_INSIGHTS')">Manager Insights</button>
  </div>

  <div class="row">
    <label>Target Module: <input id="targetModule" type="text" placeholder="Module 1: ..."/></label>
    <button onclick="callAction('GENERATE_QUIZ')">Generate Quiz</button>
  </div>

  <div class="row">
    <label>Submission Payload (JSON):</label>
    <textarea id="submissionPayload">{"submission":[{"question_id":1,"selected_choice":"A"}]}</textarea>
    <button onclick="callAction('SUBMIT_ANSWERS')">Submit Answers</button>
  </div>

  <h2>Quick Queries</h2>
  <div class="row">
    <button onclick="getState()">Get State</button>
    <button onclick="getTelemetry()">Get Telemetry</button>
    <button onclick="getDashboard()">Get Dashboard</button>
    <button onclick="getInspection()">Get Inspection</button>
  </div>

  <h2>Response</h2>
  <pre id="output">Ready</pre>

<script>
async function callAction(action) {
  const employee_id = document.getElementById('employeeId').value;
  const target_module = document.getElementById('targetModule').value || undefined;
  let submission_payload = undefined;
  if (action === 'SUBMIT_ANSWERS') {
    submission_payload = document.getElementById('submissionPayload').value;
  }

  const body = { employee_id, action };
  if (target_module) body.target_module = target_module;
  if (submission_payload) body.submission_payload = submission_payload;

  const res = await fetch('/pipeline', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  const text = await res.text();
  try { document.getElementById('output').textContent = JSON.stringify(JSON.parse(text), null, 2); }
  catch (e) { document.getElementById('output').textContent = text; }
}

async function getState() {
  const employee_id = document.getElementById('employeeId').value;
  const res = await fetch(`/state/${employee_id}`);
  const j = await res.json();
  document.getElementById('output').textContent = JSON.stringify(j, null, 2);
}
async function getTelemetry() {
  const employee_id = document.getElementById('employeeId').value;
  const res = await fetch(`/telemetry/${employee_id}`);
  const j = await res.json();
  document.getElementById('output').textContent = JSON.stringify(j, null, 2);
}
async function getDashboard() {
  const res = await fetch('/dashboard');
  const j = await res.json();
  document.getElementById('output').textContent = JSON.stringify(j, null, 2);
}
async function getInspection() {
  const res = await fetch('/inspection');
  const j = await res.json();
  document.getElementById('output').textContent = JSON.stringify(j, null, 2);
}
</script>
</body>
</html>
